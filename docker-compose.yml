version: '3'

services:

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - api1
      - api2
      - api3

  api1:
    build: ./api
    container_name: api1
    hostname: abbassah
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db

  api2:
    build: ./api
    container_name: api2
    hostname: tawhidah
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db

  api3:
    build: ./api
    container_name: api3
    hostname: tafeedah
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "15672:15672"

  worker:
    build: ./worker
    container_name: worker
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db

  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: logsdb
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: